name: Cập nhật giá

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"   # mỗi 15 phút (giờ UTC, có thể trễ vài phút)
  workflow_dispatch: {}       # cho phép bấm "Run workflow" chạy tay

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài thư viện
        run: pip install --quiet requests beautifulsoup4

      - name: Fetch giá
        run: python scripts/fetch_prices.py

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "gia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "cập nhật giá $(TZ=Asia/Ho_Chi_Minh date +'%H:%M %d/%m')"
            git push
          fi
